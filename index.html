<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Hidayet | Online Boya Arşivi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Salon Hidayet</h1>
            <button id="ayarlarBtn" class="settings-icon" title="Kayıt Paneli">
                <i class="fas fa-cog"></i>
            </button>
        </header>

        <section id="kayitPaneli" class="card hidden">
            <div class="panel-header">
                <h2 id="panelBaslik">Yeni Kayıt Ekle</h2>
                <button type="button" onclick="paneliKapat()" class="close-btn">&times;</button>
            </div>
            <form id="boyaForm">
                <input type="hidden" id="duzenlenenId">
                
                <input type="text" id="adSoyad" placeholder="Müşteri Ad Soyad" required>
                <input type="text" id="boyaMarka" placeholder="Boya Markası" required>
                
                <div id="boyaAlanlari">
                    </div>
                
                <button type="button" class="btn-secondary" onclick="boyaAlaniEkle()">+ Boya/Gram Ekle</button>

                <div class="row">
                    <input type="number" id="oksidanGram" placeholder="Oksidan Gr">
                    <select id="oksidanVol">
                        <option value="10">10 Volüm</option>
                        <option value="20" selected>20 Volüm</option>
                        <option value="30">30 Volüm</option>
                        <option value="40">40 Volüm</option>
                    </select>
                </div>
                <textarea id="notlar" placeholder="Uygulama notları..."></textarea>
                <button type="submit" class="btn-save" id="kaydetBtn">Buluta Kaydet</button>
            </form>
        </section>

        <section class="card">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="aramaInput" placeholder="Müşteri ismini yazın..." onkeyup="musteriAra()">
            </div>
            <div id="sonucAlani"></div>
        </section>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
